apiVersion: v1
kind: Service
metadata:
  name: party-den-service
spec:
  selector:
    app: party-den
  ports:
    - protocol: TCP
      port: 80         # The port the service listens on
      targetPort: 3000 # The port your Node.js app is listening on
  type: LoadBalancer   # Use LoadBalancer for Cloud (AWS/GCP) or NodePort for local (Minikube)
